<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TODO List</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 40px auto; }
  h1 { font-size: 20px; }
  #todo-form { display: flex; gap: 8px; margin-bottom: 16px; }
  #todo-input { flex: 1; padding: 8px; }
  li { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  li.done span { text-decoration: line-through; color: #999; }
  ul { list-style: none; padding: 0; }
  button.delete { margin-left: auto; }
</style>
</head>
<body>
  <h1>📝 TODO List</h1>
  <form id="todo-form">
    <input id="todo-input" type="text" placeholder="할 일을 입력하세요" required>
    <button type="submit">추가</button>
  </form>
  <ul id="todo-list"></ul>

<script>
const API = "/todos";

async function loadTodos() {
  const res = await fetch(API);
  const todos = await res.json();
  const list = document.getElementById("todo-list");
  list.innerHTML = "";
  for (const todo of todos) {
    const li = document.createElement("li");
    if (todo.done) li.classList.add("done");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = !!todo.done;
    checkbox.onchange = () => toggleTodo(todo.id);

    const span = document.createElement("span");
    span.textContent = todo.title;

    const del = document.createElement("button");
    del.textContent = "삭제";
    del.className = "delete";
    del.onclick = () => deleteTodo(todo.id);

    li.append(checkbox, span, del);
    list.appendChild(li);
  }
}

async function addTodo(title) {
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title }),
  });
  loadTodos();
}

async function toggleTodo(id) {
  await fetch(`${API}/${id}`, { method: "PATCH" });
  loadTodos();
}

async function deleteTodo(id) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  loadTodos();
}

document.getElementById("todo-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const input = document.getElementById("todo-input");
  if (!input.value.trim()) return;
  addTodo(input.value.trim());
  input.value = "";
});

loadTodos();
</script>
</body>
</html>
